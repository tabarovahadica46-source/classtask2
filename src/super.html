<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <div class="max-w-5xl mx-auto px-4 py-16 text-[#1F2428]">
  
  <div class="text-center mb-16">
    <h2 class="text-2xl md:text-3xl font-bold">
      Покупать в Великобритании очень просто
    </h2>
  </div>

  <div class="relative space-y-12 md:space-y-0 md:grid md:grid-cols-4 md:gap-8">
    
    <div class="hidden md:block absolute top-16 left-12 right-12 h-0.5 bg-gray-100 -z-10"></div>

    <div class="flex flex-col items-center text-center space-y-4 relative">
      <div class="w-28 h-28 flex items-center justify-center bg-transparent">
        <img src="" alt="Получение адреса" class="max-h-full object-contain">
      </div>
      <div class="text-4xl font-black text-[#4EC4EE]/30 font-mono leading-none">01</div>
      <div class="space-y-1 px-2">
        <h3 class="text-sm font-bold">Получение адреса для покупок</h3>
        <p class="text-xs text-gray-400 leading-relaxed">
          в Великобритании в личном кабинете OkeyPost
        </p>
      </div>
    </div>

    <div class="flex flex-col items-center text-center space-y-4 relative">
      <div class="w-28 h-28 flex items-center justify-center bg-transparent">
        <img src="" alt="Покупки в магазинах" class="max-h-full object-contain">
      </div>
      <div class="text-4xl font-black text-[#4EC4EE]/30 font-mono leading-none">02</div>
      <div class="space-y-1 px-2">
        <h3 class="text-sm font-bold">Или вы можете поручить</h3>
        <p class="text-xs text-gray-400 leading-relaxed">
          покупки нашим мастерам шопинга
        </p>
      </div>
    </div>

    <div class="flex flex-col items-center text-center space-y-4 relative">
      <div class="w-28 h-28 flex items-center justify-center bg-transparent">
        <img src="" alt="Объединение посылок" class="max-h-full object-contain">
      </div>
      <div class="text-4xl font-black text-[#4EC4EE]/30 font-mono leading-none">03</div>
      <div class="space-y-1 px-2">
        <h3 class="text-sm font-bold">Ждите уведомления</h3>
        <p class="text-xs text-gray-400 leading-relaxed">
          о прибытии ваших посылок на склад
        </p>
      </div>
    </div>

    <div class="flex flex-col items-center text-center space-y-4 relative">
      <div class="w-28 h-28 flex items-center justify-center bg-transparent">
        <img src="" alt="Доставка" class="max-h-full object-contain">
      </div>
      <div class="text-4xl font-black text-[#4EC4EE]/30 font-mono leading-none">04</div>
      <div class="space-y-1 px-2">
        <h3 class="text-sm font-bold">Оформляйте доставку в Россию</h3>
        <p class="text-xs text-gray-400 leading-relaxed">
          и ожидайте посылку дома
        </p>
      </div>
    </div>

  </div>
</div>
</body>
</html>
